<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corrector de Oraciones</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* Li et al. (2025): verde claro RGB(207,232,204) */
    --bg:          #cfe8cc;
    --surface:     #f7fbf7;   /* blanco suavizado — no puro, tinte verde muy sutil */
    --surface2:    #eef6ed;
    --border:      #c2dbbf;
    --border-soft: #d8ecd6;
    --text:        #1c2b1a;
    --text-muted:  #5a7257;
    --text-faint:  #96b593;

    --accent:      #2d6a30;
    --accent-hover:#235225;
    --accent-hi:   #d4ebd2;

    /* Bloques — sin rojo, saturación moderada (Fan et al. 2024; Désiron & Schneider 2024) */
    --c1: #2563a8;
    --c2: #2d7d4f;
    --c3: #6d3fa8;
    --c4: #b06820;
    --c5: #1a7a7a;
    --c6: #c9db52;
    --c7: #7a6020;

    --radius-card: 20px;
    --radius-pill: 999px;
    --radius-chip: 14px;
    --shadow-card: 0 2px 20px rgba(45,106,48,0.09);
    --shadow-chip: 0 2px 8px rgba(0,0,0,0.14);
    --transition:  180ms cubic-bezier(0.16,1,0.3,1);
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px 60px;
  }

  /* ── HEADER MÍNIMO ── */
  header {
    text-align: center;
    margin-bottom: 18px;
  }
  header h1 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: clamp(15px, 2vw, 20px);
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.3px;
  }

  /* ── INPUT COLAPSABLE ── */
  .input-wrap {
    width: 100%;
    max-width: 700px;
    margin-bottom: 24px;
    transition: all .4s ease;
  }
  .input-wrap.colapsado .input-card {
    padding: 10px 16px;
    box-shadow: none;
    border-color: var(--border-soft);
  }
  .input-wrap.colapsado .ejemplos-row { display: none; }

  .input-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-card);
    padding: 18px 22px;
    box-shadow: var(--shadow-card);
    transition: all .35s ease;
  }
  .input-row {
    display: flex;
    gap: 9px;
    align-items: center;
  }
  #inputTexto {
    flex: 1;
    padding: 11px 16px;
    border-radius: var(--radius-pill);
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  #inputTexto::placeholder { color: var(--text-faint); }
  #inputTexto:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(45,106,48,0.10);
  }
  #btnEnviar {
    padding: 11px 22px;
    border-radius: var(--radius-pill);
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
    white-space: nowrap;
    box-shadow: 0 2px 10px rgba(45,106,48,0.22);
  }
  #btnEnviar:hover { background: var(--accent-hover); transform: translateY(-1px); }
  #btnEnviar:active { transform: translateY(0); }
  #btnEnviar:disabled { opacity:.4; cursor:not-allowed; transform:none; }

  /* botón editar — aparece cuando está colapsado */
  #btnEditar {
    display: none;
    background: none;
    border: none;
    color: var(--text-faint);
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 6px;
    transition: color var(--transition);
    margin-left: 4px;
  }
  #btnEditar:hover { color: var(--accent); }
  .input-wrap.colapsado #btnEditar { display: inline-flex; align-items: center; gap: 4px; }

  .ejemplos-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
  }
  .ej-btn {
    padding: 5px 12px;
    border-radius: var(--radius-pill);
    border: 1.5px dashed var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all var(--transition);
  }
  .ej-btn:hover { background: var(--accent-hi); color: var(--accent); border-color: var(--accent); border-style: solid; }

  /* ── ZONA PRINCIPAL — protagonista ── */
  .zona {
    width: 100%;
    max-width: 90vw;
    display: flex;
    flex-direction: column;
    gap: 0;
    flex: 1;
  }

  /* ── PANEL ── */
  .panel {
    /* blanco suavizado — no puro #fff, sino tinte verde muy leve */
    background: var(--surface);
    border: 1.5px solid var(--border-soft);
    border-radius: var(--radius-card);
    padding: 28px 32px 32px;
    box-shadow: var(--shadow-card);
    transition: border-color var(--transition), opacity var(--transition);
    width: 100%;
  }
  .panel + .panel { margin-top: 14px; }

  .panel-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .panel-label .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    transition: background var(--transition);
  }

  .panel-resultado {
    opacity: .45;
    pointer-events: none;
  }
  .panel-resultado.listo {
    opacity: 1;
    pointer-events: auto;
    border-color: #acd4a8;
  }
  .panel-resultado.listo .dot { background: var(--accent); }

  /* ── FICHAS — más grandes, centradas ── */
  .fichas {
    display: flex;
    flex-wrap: nowrap;
    gap: 12px;
    min-height: 72px;
    align-items: center;
    justify-content: center;   /* centradas horizontalmente */
    width: 100%;
    /*overflow-x: auto;*/
    /*padding-bottom: 8px;*/
  }

  .sep {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 5px 0;
    opacity: .4;
  }
  .sep-line { flex:1; height:1px; background: var(--border); }
  .sep-icon { color: var(--text-muted); font-size: 12px; }

  /* ── BLOQUES DE PALABRAS ── */
  .ficha {
    padding: 13px 26px;
    border-radius: var(--radius-chip);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: clamp(22px, 3vw, 32px);   /* grandes para proyección */
    font-weight: 800;
    color: #fff;
    box-shadow: var(--shadow-chip);
    user-select: none;
    position: relative;
    letter-spacing: -0.3px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .ficha-ghost {
    padding: 13px 26px;
    border-radius: var(--radius-chip);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: clamp(22px, 3vw, 32px);
    font-weight: 800;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .ph {
    color: var(--text-faint);
    font-size: 14px;
    font-style: italic;
  }

  /* ── ANIMACIONES ── */
  @keyframes aparecer {
    from { opacity:0; transform: translateY(-14px) scale(.86); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }
  @keyframes shake {
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-5px) rotate(-2deg); }
    40%{ transform:translateX(5px)  rotate(2deg); }
    60%{ transform:translateX(-3px) rotate(-1deg); }
    80%{ transform:translateX(3px)  rotate(1deg); }
  }
  @keyframes glow-green {
    0%  { box-shadow: var(--shadow-chip); }
    50% { box-shadow: 0 0 24px 7px rgba(45,106,48,0.32); }
    100%{ box-shadow: var(--shadow-chip); }
  }

  .ficha.anim-aparecer { animation: aparecer .34s ease both; }
  .ficha.anim-shake    { animation: shake .4s ease-in-out; }
  .ficha.anim-glow     { animation: glow-green .85s ease forwards; }

  /* ── FICHA VOLADORA ── */
  .ficha-voladora {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    padding: 13px 26px;
    border-radius: var(--radius-chip);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: clamp(22px, 3vw, 32px);
    font-weight: 800;
    color: #fff;
    box-shadow: 0 4px 18px rgba(0,0,0,.18);
    will-change: transform, opacity;
  }

  /* ── BOTÓN REVELAR ── */
  #btnRevelar {
    display: none;
    margin: 16px auto 0;
    padding: 13px 34px;
    border-radius: var(--radius-pill);
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 3px 16px rgba(45,106,48,0.25);
    transition: background var(--transition), transform var(--transition);
  }
  #btnRevelar:hover { background: var(--accent-hover); transform: translateY(-1px); }
  #btnRevelar.visible { display: block; }

  /* ── OPCIONES ── */
  .opciones-wrap {
    width: 100%;
    max-width: 1000px;
    margin-top: 14px;
    display: none;
    background: var(--surface);
    border: 1.5px solid var(--border-soft);
    border-radius: var(--radius-card);
    padding: 18px 22px;
    box-shadow: var(--shadow-card);
  }
  .opciones-titulo {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
  }
  .opciones-lista { display: flex; flex-wrap: wrap; gap: 8px; }
  .opcion-btn {
    padding: 7px 15px;
    border-radius: var(--radius-pill);
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all var(--transition);
  }
  .opcion-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── ESTADO / LOADING ── */
  #estadoMsg {
    display: none;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    margin-bottom: 12px;
    background: var(--surface);
    padding: 9px 16px;
    border-radius: var(--radius-pill);
    border: 1.5px solid var(--border);
    width: fit-content;
  }
  .spinner {
    width: 15px; height: 15px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .75s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #errorMsg {
    display: none;
    color: #5a1a1a;
    font-size: 13px;
    padding: 9px 16px;
    background: #fdecea;
    border-radius: 12px;
    border: 1.5px solid #f5b8b8;
    margin-bottom: 12px;
    font-weight: 500;
    width: 100%;
    max-width: 700px;
  }
</style>
</head>
<body>

<header>
  <h1>Corrector de Oraciones</h1>
</header>

<div id="errorMsg">No se pudo conectar. ¿Está corriendo localhost:8000?</div>
<div id="estadoMsg"><div class="spinner"></div><span id="estadoTexto">Procesando...</span></div>

<div class="input-wrap" id="inputWrap">
  <div class="input-card">
    <div class="input-row">
      <input id="inputTexto" type="text"
             placeholder="Escribe la oración desordenada..."
             autocomplete="off"/>
      <button id="btnEnviar" onclick="mostrarYProcesar()">Enviar</button>
      <button id="btnEditar" onclick="expandirInput()" title="Editar oración">
        ✎ editar
      </button>
    </div>
    <div class="ejemplos-row">
      <button class="ej-btn" onclick="usar('perro el come pescado')">perro el come pescado</button>
      <button class="ej-btn" onclick="usar('casa la es grande')">casa la es grande</button>
      <button class="ej-btn" onclick="usar('estudiantes los estudian biblioteca en la')">estudiantes los estudian...</button>
      <button class="ej-btn" onclick="usar('juega niña la con pelota amarilla la')">juega niña la con pelota...</button>
    </div>
  </div>
</div>

<div class="zona">
  <div class="panel">
    <div class="panel-label">
      <span class="dot" style="background:var(--accent)"></span>
      Oración ingresada
    </div>
    <div class="fichas" id="fichasOrig">
      <span class="ph">Aquí aparecerá tu oración...</span>
    </div>
  </div>

  <div class="sep">
    <div class="sep-line"></div>
    <div class="sep-icon">↓</div>
    <div class="sep-line"></div>
  </div>

  <div class="panel panel-resultado" id="panelResultado">
    <div class="panel-label">
      <span class="dot"></span>
      Oración corregida
    </div>
    <div class="fichas" id="fichasDest">
      <span class="ph">Esperando resultado...</span>
    </div>
  </div>
</div>

<button id="btnRevelar" onclick="revelarResultado()">Ver oración corregida</button>

<div class="opciones-wrap" id="opcionesWrap">
  <div class="opciones-titulo">Otras posibilidades</div>
  <div class="opciones-lista" id="opcionesLista"></div>
</div>

<script>
const API = 'http://localhost:8000/corregir';

/* Sin rojo — Fan et al. (2024): rojo = mayor fatiga visual
   Saturación moderada — Désiron & Schneider (2024): color señala relevancia */
const COLORES = [
  '#2563a8',  // azul medio
  '#2d7d4f',  // verde bosque
  '#6d3fa8',  // violeta suave
  '#b06820',  // ámbar oscuro
  '#1a7a7a',  // teal
  '#5c4ab0',  // índigo
  '#7a6020'   // dorado oscuro
];

let mapaColor = {};
let estadoPendiente = null;
let palabrasOrigActuales = [];

const wait = ms => new Promise(r => setTimeout(r, ms));

function getColor(palabra, idx) {
  const k = palabra.toLowerCase();
  if (!mapaColor[k]) mapaColor[k] = COLORES[idx % COLORES.length];
  return mapaColor[k];
}

function colapsarInput() {
  document.getElementById('inputWrap').classList.add('colapsado');
}
function expandirInput() {
  document.getElementById('inputWrap').classList.remove('colapsado');
  document.getElementById('inputTexto').focus();
}

async function mostrarYProcesar() {
  const texto = document.getElementById('inputTexto').value.trim();
  if (!texto) return;

  const btn = document.getElementById('btnEnviar');
  btn.disabled = true;

  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('opcionesWrap').style.display = 'none';
  document.getElementById('btnRevelar').classList.remove('visible');
  document.getElementById('panelResultado').classList.remove('listo');
  document.getElementById('fichasDest').innerHTML = '<span class="ph">Esperando resultado...</span>';
  estadoPendiente = null;

  // Colapsar input para dar protagonismo a los bloques
  colapsarInput();

  const palabrasOrig = texto.split(/\s+/);
  palabrasOrigActuales = palabrasOrig;
  mapaColor = {};

  await mostrarOriginales(palabrasOrig);
  mostrarEstado('Analizando la oración...');

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ texto })
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    estadoPendiente = data;
    ocultarEstado();
    document.getElementById('btnRevelar').classList.add('visible');
    document.getElementById('panelResultado').classList.add('listo');
  } catch {
    ocultarEstado();
    document.getElementById('errorMsg').style.display = 'block';
    btn.disabled = false;
    expandirInput();
  }
}

async function revelarResultado() {
  if (!estadoPendiente) return;
  document.getElementById('btnRevelar').classList.remove('visible');
  const data = estadoPendiente;
  estadoPendiente = null;

  const palabrasDest = data.texto_corregido.trim().split(/\s+/);
  await animarVuelo(palabrasOrigActuales, palabrasDest);

  const otras = (data.opciones || []).filter(
    o => o.trim().toLowerCase() !== data.texto_corregido.trim().toLowerCase()
  );
  if (otras.length) {
    const lista = document.getElementById('opcionesLista');
    lista.innerHTML = '';
    otras.forEach(o => {
      const b = document.createElement('button');
      b.className = 'opcion-btn';
      b.textContent = o;
      b.onclick = () => reanimar(palabrasOrigActuales, o.trim().split(/\s+/));
      lista.appendChild(b);
    });
    document.getElementById('opcionesWrap').style.display = 'block';
  }
  document.getElementById('btnEnviar').disabled = false;
}

async function mostrarOriginales(palabras) {
  mapaColor = {};
  const cont = document.getElementById('fichasOrig');
  cont.innerHTML = '';
  for (let i = 0; i < palabras.length; i++) {
    const f = document.createElement('div');
    f.className = 'ficha anim-aparecer';
    f.textContent = palabras[i];
    f.style.background = getColor(palabras[i], i);
    f.style.animationDelay = `${i * 70}ms`;
    f.dataset.palabra = palabras[i];
    cont.appendChild(f);
    await wait(50);
  }
  await wait(palabras.length * 70 + 100);
  cont.querySelectorAll('.ficha').forEach(f => {
    f.classList.remove('anim-shake');
    void f.offsetWidth;
    f.classList.add('anim-shake');
  });
  await wait(450);
}

function volarFicha(palabra, color, rectO, rectD) {
  return new Promise(resolve => {
    const v = document.createElement('div');
    v.className = 'ficha-voladora';
    v.textContent = palabra;
    v.style.background = color;
    v.style.left  = rectO.left + 'px';
    v.style.top   = rectO.top  + 'px';
    v.style.width = rectO.width + 'px';
    document.body.appendChild(v);

    const dx = rectD.left - rectO.left;
    const dy = rectD.top  - rectO.top;

    v.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: `translate(${dx*.5}px,${dy*.4 - 45}px) scale(1.10)`, opacity: 1, offset: .45 },
      { transform: `translate(${dx}px,${dy}px) scale(1)`, opacity: 1 }
    ], {
      duration: 560,
      easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
      fill: 'forwards'
    }).onfinish = () => { v.remove(); resolve(); };
  });
}

async function animarVuelo(palabrasOrig, palabrasDest) {
  const contDest = document.getElementById('fichasDest');
  const contOrig = document.getElementById('fichasOrig');
  contDest.innerHTML = '';

  const fantasmas = palabrasDest.map((p, i) => {
    const g = document.createElement('div');
    g.className = 'ficha-ghost';
    g.textContent = p;
    g.style.background = getColor(p, i);
    contDest.appendChild(g);
    return g;
  });

  await wait(60);

  const origFichas = Array.from(contOrig.querySelectorAll('.ficha'));
  const usados = new Set();

  for (let i = 0; i < palabrasDest.length; i++) {
    const palabra = palabrasDest[i];
    const color   = getColor(palabra, i);
    const ghost   = fantasmas[i];

    let fichaOrig = null;
    for (let j = 0; j < origFichas.length; j++) {
      if (!usados.has(j) && origFichas[j].dataset.palabra.toLowerCase() === palabra.toLowerCase()) {
        fichaOrig = origFichas[j];
        usados.add(j);
        break;
      }
    }

    const rectDest = ghost.getBoundingClientRect();

    if (fichaOrig) {
      const rectOrig = fichaOrig.getBoundingClientRect();
      fichaOrig.style.opacity = '0.2';
      await volarFicha(palabra, color, rectOrig, rectDest);
    }

    ghost.classList.remove('ficha-ghost');
    ghost.classList.add('ficha', 'anim-glow');
    ghost.style.opacity = '1';
    await wait(70);
  }
}

function mostrarEstado(msg) {
  const el = document.getElementById('estadoMsg');
  document.getElementById('estadoTexto').textContent = msg;
  el.style.display = 'flex';
}
function ocultarEstado() {
  document.getElementById('estadoMsg').style.display = 'none';
}

async function reanimar(orig, dest) {
  document.getElementById('fichasDest').innerHTML = '<span class="ph">Reordenando...</span>';
  document.getElementById('fichasOrig').querySelectorAll('.ficha').forEach(f => f.style.opacity = '1');
  await wait(160);
  await animarVuelo(orig, dest);
}

function usar(t) {
  document.getElementById('inputTexto').value = t;
  mostrarYProcesar();
}

document.getElementById('inputTexto').addEventListener('keydown', e => {
  if (e.key === 'Enter') mostrarYProcesar();
});
</script>
</body>
</html>
